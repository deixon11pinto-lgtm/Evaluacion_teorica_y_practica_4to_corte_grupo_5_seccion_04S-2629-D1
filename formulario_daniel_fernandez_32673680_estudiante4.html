<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Seguro UNEFA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .contenedor { max-width: 400px; margin: 50px auto; background: white; padding: 25px; border-radius: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ccc; border-radius: 4px; }
        input:focus:invalid { border-color: #ff4d4d; box-shadow: 0 0 5px #ff4d4d; }
        input:focus:valid { border-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>Registro Perimetral</h2>
        <form action="registro.php" method="POST">
            <input type="text" name="nombre" placeholder="Nombre Completo" required minlength="4">
            <input type="text" name="usuario" placeholder="Usuario" required minlength="4">
            <input type="password" name="clave" placeholder="Contraseña" required minlength="6">
            <button type="submit">Enviar Postulación</button>
        </form>
    </div>
</body>
</html>
